- id: sudo.baron_samedit.cve_2021_3156.exposed
  name: Sudo Baron Samedit 本地提权暴露
  enabled: true
  service: sudo
  severity: critical
  description: 已授权主机检查发现当前 Debian/Ubuntu 主机上的 sudo 软件包版本低于发行版修复版本；对已停止支持的旧版发行版，按 sudo 上游 1.8.32 修复基线判定 Baron Samedit 本地提权暴露面。
  match:
    package:
      manager: dpkg
      name: sudo
      compare: lt_fixed
      fixed_versions:
        ubuntu:
          '8.04': '1.8.32'
          '16.04': 1.8.16-0ubuntu1.10
          '18.04': 1.8.21p2-3ubuntu1.4
          '20.04': 1.8.31-1ubuntu1.2
          '20.10': 1.9.1-1ubuntu1.1
        debian:
          '10': 1.8.27-1+deb10u3
          '11': 1.9.5p2-3+deb11u1
