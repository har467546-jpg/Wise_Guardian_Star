    - 确认当前处于可接受的业务维护窗口，并已准备配置或路径备份。
    verify_items:
    - 抓取 MySQL 握手信息并确认实际安装的软件包版本。
    - 检查该服务是否可从非管理网络访问。
    - 确认 mysql 相关风险点已复测通过。
    - 确认 mysql 服务健康检查与关键访问路径正常。
    rollback_notes:
    - 记录 mysql 当前版本，并在变更窗口内完成升级回退验证。
    - 确认服务管理窗口与健康检查后再执行回滚。
    actions:
    - action_type: upgrade_package
      title: 升级 mysql 到不受影响版本
      params:
        service_name: mysql
        package_name: mysql
        version_constraint: <5.7
        rule_id: mysql.version.lt_5_7
      requires_confirmation: true
      rollback_hint: 记录 mysql 当前版本，并在变更窗口内完成升级回退验证。
      target_services:
      - mysql
      verify_items:
      - 确认 mysql 相关风险点已复测通过。
      - 确认 mysql 服务健康检查与关键访问路径正常。
    - action_type: restart_service
      title: 重启服务使修复生效：mysql
      params:
        service_name: mysql
      requires_confirmation: true
      rollback_hint: 确认服务管理窗口与健康检查后再执行回滚。
      target_services:
      - mysql
      verify_items:
      - 确认 mysql 相关风险点已复测通过。
      - 确认 mysql 服务健康检查与关键访问路径正常。
    references:
    - https://nvd.nist.gov/vuln/detail/CVE-2016-6662
  references:
  - https://nvd.nist.gov/vuln/detail/CVE-2016-6662
  tags:
  - database
  - legacy
  - legacy-exposure
- id: mysql.skip_grant_tables.enabled
  name: MySQL 跳过授权表启动
  enabled: true
  service: mysql
  severity: critical
  description: MySQL 配置启用了 skip-grant-tables，服务启动后将绕过常规权限检查，属于高危认证失效状态。
  match:
    config:
      skip_grant_tables:
        eq: true
  affected_versions_text: 启用 skip-grant-tables 的 MySQL 配置
  preconditions:
  - 确认已完成 SSH 深度检查，并识别稳定的配置文件或暴露路径。
  - 确认当前处于可接受的业务维护窗口，并已准备配置或路径备份。
  verify_playbook:
  - 复核 my.cnf 及实例启动参数中是否启用了 skip-grant-tables。
  - 确认该设置是否仅用于短暂的离线维护窗口。
  mitigations:
  - 立即移除 skip-grant-tables 并重启到正常认证模式。
  - 对维护场景采用受控停机和临时变更流程，不保留长期绕过认证配置。
  remediation:
    summary: 收敛 mysql 的配置与暴露面
    automation_level: callable
    impact_summary: 该模板会收敛 mysql 的暴露入口、监听范围或访问策略，可能影响当前管理路径与来源网段。
    precheck_items:
    - 确认已完成 SSH 深度检查，并识别稳定的配置文件或暴露路径。
    - 确认当前处于可接受的业务维护窗口，并已准备配置或路径备份。
    verify_items:
    - 复核 my.cnf 及实例启动参数中是否启用了 skip-grant-tables。
    - 确认该设置是否仅用于短暂的离线维护窗口。
    - 确认 mysql 风险配置已按预期生效。
    rollback_notes:
    - 变更前保留原配置并验证业务影响。
    actions:
    - action_type: toggle_feature
      title: 关闭 mysql 的高风险特性
      params:
        service_name: mysql
        config_key: skip_grant_tables
        feature_key: skip_grant_tables
        desired_state: false
        rule_id: mysql.skip_grant_tables.enabled
      requires_confirmation: true
      rollback_hint: 变更前保留原配置并验证业务影响。
      target_files:
      - /etc/mysql/my.cnf
      - /etc/my.cnf
      target_services:
      - mysql
      verify_items:
      - 确认 mysql 风险配置已按预期生效。
    references:
    - https://dev.mysql.com/doc/refman/8.0/en/server-options.html#option_mysqld_skip-grant-tables
  references:
  - https://dev.mysql.com/doc/refman/8.0/en/server-options.html#option_mysqld_skip-grant-tables
  tags:
  - mysql
  - config
  - high-value
- id: mysql.local_infile.enabled
  name: MySQL 允许 LOCAL INFILE
  enabled: true
  service: mysql
  severity: high
  description: MySQL 配置启用了 local_infile，会扩大文件导入相关攻击面，应结合账号权限和业务必要性审查。
  match:
    config:
      local_infile:
        eq: true
  affected_versions_text: 启用 local_infile 的 MySQL 配置
  preconditions:
  - 确认已完成 SSH 深度检查，并识别稳定的配置文件或暴露路径。
  - 确认当前处于可接受的业务维护窗口，并已准备配置或路径备份。
  verify_playbook:
  - 复核 my.cnf 与运行时变量中 local_infile 的状态。
  - 结合应用场景确认是否真实需要客户端本地文件导入。
  mitigations:
  - 如无明确业务需要，关闭 local_infile。
  - 对必须保留的场景收敛来源主机、账号权限和导入路径。
  remediation:
    summary: 收敛 mysql 的配置与暴露面
    automation_level: callable
    impact_summary: 该模板会收敛 mysql 的暴露入口、监听范围或访问策略，可能影响当前管理路径与来源网段。
    precheck_items:
    - 确认已完成 SSH 深度检查，并识别稳定的配置文件或暴露路径。
    - 确认当前处于可接受的业务维护窗口，并已准备配置或路径备份。
    verify_items:
    - 复核 my.cnf 与运行时变量中 local_infile 的状态。
    - 结合应用场景确认是否真实需要客户端本地文件导入。
    - 确认 mysql 风险配置已按预期生效。
    rollback_notes:
    - 变更前保留原配置并验证业务影响。
    actions:
    - action_type: toggle_feature
      title: 关闭 mysql 的高风险特性
      params:
        service_name: mysql
        config_key: local_infile
        feature_key: local_infile
        desired_state: false
        rule_id: mysql.local_infile.enabled
      requires_confirmation: true
      rollback_hint: 变更前保留原配置并验证业务影响。
      target_files:
      - /etc/mysql/my.cnf
      - /etc/my.cnf
      target_services:
      - mysql
      verify_items:
      - 确认 mysql 风险配置已按预期生效。
    references:
    - https://dev.mysql.com/doc/refman/8.0/en/server-system-variables.html#sysvar_local_infile
  references:
  - https://dev.mysql.com/doc/refman/8.0/en/server-system-variables.html#sysvar_local_infile
  tags:
  - mysql
  - config
  - high-value
- id: mysql.bind_all_interfaces.enabled
  name: MySQL 监听全部网卡
  enabled: true
  service: mysql
  severity: high
  description: MySQL 配置监听全部网卡，会显著扩大数据库服务的网络暴露面，应与认证和来源限制一并审查。
  match:
    config:
      bind_all_interfaces:
        eq: true
  affected_versions_text: bind-address 或等效配置监听全部网卡的 MySQL 部署
  preconditions:
  - 确认已完成 SSH 深度检查，并识别稳定的配置文件或暴露路径。
  - 确认当前处于可接受的业务维护窗口，并已准备配置或路径备份。
  verify_playbook:
  - 复核 my.cnf 中 bind-address 或等效监听参数。
  - 确认 3306 是否对非管理网段开放。
  mitigations:
  - 将 MySQL 绑定到回环地址或专用管理网段。
  - 配合防火墙、访问控制列表和最小权限账号限制来源。
  remediation:
    summary: 收敛 mysql 的配置与暴露面
    automation_level: callable
    impact_summary: 该模板会收敛 mysql 的暴露入口、监听范围或访问策略，可能影响当前管理路径与来源网段。
    precheck_items:
    - 确认已完成 SSH 深度检查，并识别稳定的配置文件或暴露路径。
    - 确认当前处于可接受的业务维护窗口，并已准备配置或路径备份。
    verify_items:
    - 复核 my.cnf 中 bind-address 或等效监听参数。
    - 确认 3306 是否对非管理网段开放。
    - 确认 mysql 仅对管理范围开放，且未再暴露高风险入口。
    rollback_notes:
    - 变更前保留原配置并验证业务影响。
    actions:
    - action_type: set_bind_scope
      title: 限制 mysql 的监听与来源范围
      params:
        service_name: mysql
        config_key: bind_all_interfaces
        target_scope: admin_segment_only
        rule_id: mysql.bind_all_interfaces.enabled
      requires_confirmation: true
      rollback_hint: 变更前保留原配置并验证业务影响。
      target_files:
      - /etc/mysql/my.cnf
      - /etc/my.cnf
      target_services:
      - mysql
      verify_items:
      - 确认 mysql 仅对管理范围开放，且未再暴露高风险入口。
    references:
    - https://dev.mysql.com/doc/refman/8.0/en/server-system-variables.html#sysvar_bind_address
  references:
  - https://dev.mysql.com/doc/refman/8.0/en/server-system-variables.html#sysvar_bind_address
  tags:
  - mysql
  - config
  - high-value
- id: redis.auth.disabled
  name: Redis 未启用认证
  enabled: true
  service: redis
  severity: critical
  description: Redis 未启用认证，服务可能接受未授权访问。
  match:
    config:
      requirepass:
        exists: false
  affected_versions_text: 未配置 requirepass 或更强访问控制的 Redis 部署
  preconditions:
  - 确认已完成 SSH 深度检查，并识别稳定的配置文件或暴露路径。
  - 确认当前处于可接受的业务维护窗口，并已准备配置或路径备份。
  verify_playbook:
  - 检查 Redis 配置中是否启用了 requirepass 或 ACL。
  - 确认服务是否绑定在对外网卡上。
  mitigations:
  - 启用 Redis 认证或 ACL。
  - 仅允许可信主机访问 Redis。
  remediation:
    summary: 收敛 redis 的配置与暴露面
    automation_level: callable
    impact_summary: 该模板会收敛 redis 的暴露入口、监听范围或访问策略，可能影响当前管理路径与来源网段。
    precheck_items:
    - 确认已完成 SSH 深度检查，并识别稳定的配置文件或暴露路径。
    - 确认当前处于可接受的业务维护窗口，并已准备配置或路径备份。
    verify_items:
    - 检查 Redis 配置中是否启用了 requirepass 或 ACL。
    - 确认服务是否绑定在对外网卡上。
    - 确认 redis 仅对管理范围开放，且未再暴露高风险入口。
    rollback_notes:
    - 变更前保留原配置并验证业务影响。
    actions:
    - action_type: set_access_policy
      title: 收紧 redis 的访问策略
      params:
        service_name: redis
        config_key: requirepass
        target_policy: least_privilege
