rules:
- id: nginx.version.lt_1_18
  name: nginx 低版本暴露
  enabled: true
  service: nginx
  severity: high
  description: nginx 版本低于 1.18，应视为遗留暴露并尽快升级。
  match:
    version: <1.18
  cve_ids:
  - CVE-2021-23017
  affected_versions_text: nginx 1.18 以下版本
  preconditions:
  - 确认目标主机已识别软件包管理器，并记录当前版本与回滚版本。
  - 确认当前处于可接受的业务维护窗口，并已准备配置或路径备份。
  verify_playbook:
  - 确认 Server 头或软件包清单显示 nginx 版本低于 1.18。
  - 核实该实例是否对互联网开放，或可被不受信任网段访问。
  mitigations:
  - 将 nginx 升级到受支持版本。
  - 限制管理路径或遗留 Web 路径的访问范围。
  remediation:
    summary: 升级或替换受影响的 nginx 版本
    automation_level: callable
    impact_summary: 该模板会升级 nginx 或相关组件，并在修复后重载或重启服务，期间可能出现短暂业务抖动。
    precheck_items:
    - 确认目标主机已识别软件包管理器，并记录当前版本与回滚版本。
    - 确认当前处于可接受的业务维护窗口，并已准备配置或路径备份。
    verify_items:
    - 确认 Server 头或软件包清单显示 nginx 版本低于 1.18。
    - 核实该实例是否对互联网开放，或可被不受信任网段访问。
    - 确认 nginx 相关风险点已复测通过。
    - 确认 nginx 服务健康检查与关键访问路径正常。
    rollback_notes:
    - 记录 nginx 当前版本，并在变更窗口内完成升级回退验证。
    - 确认服务管理窗口与健康检查后再执行回滚。
    actions:
    - action_type: upgrade_package
      title: 升级 nginx 到不受影响版本
      params:
        service_name: nginx
        package_name: nginx
        version_constraint: <1.18
        rule_id: nginx.version.lt_1_18
      requires_confirmation: true
      rollback_hint: 记录 nginx 当前版本，并在变更窗口内完成升级回退验证。
      target_services:
      - nginx
      verify_items:
      - 确认 nginx 相关风险点已复测通过。
      - 确认 nginx 服务健康检查与关键访问路径正常。
    - action_type: reload_service
      title: 重载服务配置：nginx
      params:
        service_name: nginx
      requires_confirmation: true
      rollback_hint: 确认服务管理窗口与健康检查后再执行回滚。
      target_services:
      - nginx
      verify_items:
      - 确认 nginx 相关风险点已复测通过。
      - 确认 nginx 服务健康检查与关键访问路径正常。
    references:
    - https://nginx.org/en/security_advisories.html
  references:
  - https://nginx.org/en/security_advisories.html
  tags:
  - web
  - legacy
  - legacy-exposure
- id: mysql.version.lt_5_7
  name: MySQL 低版本暴露
