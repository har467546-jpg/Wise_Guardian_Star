- id: git.repository.exposed.http
  name: Git 仓库暴露（HTTP）
  enabled: true
  service: http
  severity: high
  description: Nmap 脚本发现目标可访问 .git/HEAD，说明源代码仓库可能直接暴露。
  match:
    nse:
      http-git.git_head_exposed:
        eq: true
  affected_versions_text: 可直接访问 .git/HEAD 的 HTTP 服务
  preconditions:
  - 确认已完成 SSH 深度检查，并识别稳定的配置文件或暴露路径。
  - 确认当前处于可接受的业务维护窗口，并已准备配置或路径备份。
  verify_playbook:
  - 复核 http-git 输出中的暴露路径。
  - 确认是否可进一步还原仓库历史与敏感文件。
  mitigations:
  - 从 Web 根目录移除 .git 目录。
  - 增加 Web 服务器访问控制并重新轮换泄露凭据。
  remediation:
    summary: 收敛 http 的远程暴露入口
    automation_level: callable
    impact_summary: 该模板会收敛 http 的暴露入口、监听范围或访问策略，可能影响当前管理路径与来源网段。
    precheck_items:
    - 确认已完成 SSH 深度检查，并识别稳定的配置文件或暴露路径。
    - 确认当前处于可接受的业务维护窗口，并已准备配置或路径备份。
    verify_items:
    - 复核 http-git 输出中的暴露路径。
    - 确认是否可进一步还原仓库历史与敏感文件。
    - 确认 http 风险配置已按预期生效。
    - 确认 http 仅对管理范围开放，且未再暴露高风险入口。
    rollback_notes:
    - 确认替代访问路径或管理入口后再回滚。
    - 回滚前确认访问控制变更不会重新暴露公网或办公网。
    actions:
    - action_type: toggle_feature
      title: 下线或隐藏 http 暴露面
      params:
        service_name: http
        rule_id: git.repository.exposed.http
        exposure_id: git.repository.exposed.http
        config_key: exposure_disabled
        feature_key: exposure_disabled
        desired_state: false
      requires_confirmation: true
      rollback_hint: 确认替代访问路径或管理入口后再回滚。
      target_services:
      - http
      verify_items:
      - 确认 http 风险配置已按预期生效。
    - action_type: set_bind_scope
      title: 限制 http 暴露来源
      params:
        service_name: http
        target_scope: admin_segment_only
        rule_id: git.repository.exposed.http
      requires_confirmation: true
      rollback_hint: 回滚前确认访问控制变更不会重新暴露公网或办公网。
      target_services:
      - http
      verify_items:
      - 确认 http 仅对管理范围开放，且未再暴露高风险入口。
    references:
    - https://nmap.org/nsedoc/scripts/http-git.html
  references:
  - https://nmap.org/nsedoc/scripts/http-git.html
