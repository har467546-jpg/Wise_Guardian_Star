- id: ssh.root_password_login.exposed
  name: SSH Root 密码登录暴露
  enabled: true
  service: ssh
  severity: critical
  description: SSH 同时允许 Root 远程登录和密码认证，属于最容易被暴力破解或撞库利用的高危入口。
  match:
    config:
      permit_root_login:
        eq: true
      password_authentication:
        eq: true
  affected_versions_text: 允许 Root 密码登录的 SSH 部署
  preconditions:
  - 确认已完成 SSH 深度检查，并识别稳定的配置文件或暴露路径。
  - 确认当前处于可接受的业务维护窗口，并已准备配置或路径备份。
  verify_playbook:
  - 检查 sshd_config 中的 PermitRootLogin 和 PasswordAuthentication 配置。
  - 确认该服务是否暴露在非管理网络。
  mitigations:
  - 禁用 Root 直接登录并关闭密码认证。
  - 仅允许堡垒机或管理网段访问 SSH。
  remediation:
    summary: 收敛 ssh 的配置与暴露面
    automation_level: callable
    impact_summary: 该模板会收敛 ssh 的暴露入口、监听范围或访问策略，可能影响当前管理路径与来源网段。
    precheck_items:
    - 确认已完成 SSH 深度检查，并识别稳定的配置文件或暴露路径。
    - 确认当前处于可接受的业务维护窗口，并已准备配置或路径备份。
    verify_items:
    - 检查 sshd_config 中的 PermitRootLogin 和 PasswordAuthentication 配置。
    - 确认该服务是否暴露在非管理网络。
    - 确认 ssh 风险配置已按预期生效。
    rollback_notes:
    - 变更前保留原配置并验证业务影响。
    actions:
    - action_type: toggle_feature
      title: 关闭 ssh 的高风险特性
      params:
        service_name: ssh
        config_key: permit_root_login
        feature_key: permit_root_login
        desired_state: false
        rule_id: ssh.root_password_login.exposed
      requires_confirmation: true
      rollback_hint: 变更前保留原配置并验证业务影响。
      target_files:
      - /etc/ssh/sshd_config
      target_services:
      - ssh
