<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>__REPORT_TITLE__</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        :root {
            --primary-blue: #1677ff;
            --danger-red: #ff4d4f;
            --warning-orange: #faad14;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-secondary: #666666;
            --border-color: #f0f0f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 260px;
            background-color: #001529;
            color: rgba(255, 255, 255, 0.65);
            overflow-y: auto;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .sidebar h2 {
            color: #fff;
            font-size: 1.2rem;
            padding: 20px;
            margin: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-link {
            display: block;
            padding: 12px 20px;
            color: inherit;
            text-decoration: none;
            transition: 0.2s;
        }

        .nav-link:hover, .nav-link.active {
            color: #fff;
            background-color: var(--primary-blue);
        }

        .sub-nav .nav-link {
            padding-left: 40px;
            font-size: 0.9rem;
        }

        .main-content {
            flex-grow: 1;
            padding: 30px 40px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
        }

        .report-title h1 {
            font-size: 1.8rem;
            margin: 0 0 5px 0;
            color: var(--text-main);
        }

        .report-title p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .btn-export {
            background-color: var(--primary-blue);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.045);
            white-space: nowrap;
        }

        .section-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 1px 2px -2px rgba(0,0,0,0.16), 0 3px 6px 0 rgba(0,0,0,0.12);
        }

        .section-title {
            font-size: 1.3rem;
            border-left: 4px solid var(--primary-blue);
            padding-left: 12px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .sub-title {
            font-size: 1.1rem;
            margin: 20px 0 15px 0;
            color: #444;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .data-stat {
            background: #fafafa;
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 6px;
            text-align: center;
        }

        .data-stat .label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .data-stat .value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--text-main);
            word-break: break-word;
        }

        .value.danger { color: var(--danger-red); }
        .value.warning { color: var(--warning-orange); }
        .value.primary { color: var(--primary-blue); }

        .chart-container {
            width: 100%;
            height: 350px;
            margin-top: 10px;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .info-table th, .info-table td {
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            text-align: left;
            font-size: 0.95rem;
            vertical-align: top;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .info-table th {
            background-color: #fafafa;
            font-weight: 600;
        }

        .summary-text {
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .bullet-list {
            margin: 0;
            padding-left: 20px;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .empty-placeholder {
            min-height: 42px;
        }

        .muted-note {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @media (max-width: 1280px) {
            .data-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 960px) {
            body {
                display: block;
                height: auto;
            }
            .sidebar {
                width: 100%;
            }
            .main-content {
                padding: 20px;
            }
            .header-actions {
                flex-direction: column;
                align-items: flex-start;
            }
            .data-grid {
                grid-template-columns: 1fr;
            }
        }

        @media print {
            body { background-color: #fff; height: auto; overflow: visible; }
            .sidebar, .btn-export { display: none; }
            .main-content { padding: 0; overflow: visible; }
            .section-card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; margin-bottom: 20px; }
            .chart-container { page-break-inside: avoid; }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <h2>报告目录</h2>
        __TOC_HTML__
    </nav>

    <main class="main-content">
        <div class="header-actions">
            <div class="report-title">
                <h1>__REPORT_TITLE__</h1>
                <p>__REPORT_SUBTITLE__ | 生成时间：__CREATED_AT__</p>
            </div>
            <button class="btn-export" onclick="exportPDF()">📥 导出 PDF 报告</button>
        </div>

        __MAIN_CONTENT_HTML__
    </main>

    <script>
        function exportPDF() {
            if (window.vulnLevelChartInstance) {
                window.vulnLevelChartInstance.resize();
            }
            if (window.vulnTypeChartInstance) {
                window.vulnTypeChartInstance.resize();
            }
            setTimeout(() => {
                window.print();
            }, 500);
        }

        __REPORT_SCRIPT__
    </script>
</body>
</html>
